<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VIP — Lineamientos de Interoperabilidad</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Wiki de lineamientos VIP — Alcaldía de Medellín">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #0D47A1;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #0D47A1;
      --sidebar-name-color: #0D47A1;
      --sidebar-name-font-weight: bold;
      --heading-color: #1a1a2e;
      --code-theme-background: #f5f5f5;
    }
    .sidebar .app-name {
      font-size: 1.1em;
      padding: 20px 15px 10px;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'VIP Lineamientos',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Buscar...',
        noData: 'Sin resultados',
        depth: 3
      },
      auto2top: true,
      homepage: 'index.md'
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-properties.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
